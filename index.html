<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>K线训练器</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Microsoft YaHei,sans-serif;background:#0a0f14;color:#d0d6e0;min-height:100vh}
.container{max-width:1100px;margin:0 auto;padding:12px 16px}

/* Top bar */
.top-bar{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid #1a2530;flex-wrap:wrap}
.logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,#f39c12,#e74c3c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.top-bar input{width:110px;padding:7px 10px;border:1px solid #1e2d3d;border-radius:6px;background:#141e2a;color:#d0d6e0;font-size:15px;outline:none;text-align:center;letter-spacing:2px}
.top-bar input:focus{border-color:#f59e0b}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;cursor:pointer;transition:all .2s;font-weight:600;white-space:nowrap}
.btn:active{transform:scale(.95)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-start{background:linear-gradient(135deg,#f59e0b,#e67e22);color:#fff;font-size:16px;min-width:140px}
.btn-start:hover:not(:disabled){background:linear-gradient(135deg,#fbbf24,#f59e0b)}
.btn-again{background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;font-size:16px;min-width:140px}
.btn-again:hover:not(:disabled){background:linear-gradient(135deg,#818cf8,#6366f1)}

/* Dashboard */
.dash{display:flex;gap:10px;padding:10px 0;flex-wrap:wrap;align-items:center;justify-content:space-between}
.dash-item{text-align:center}
.dash-label{font-size:10px;color:#556;text-transform:uppercase;letter-spacing:1px}
.dash-val{font-size:15px;font-weight:600}
.dash-val.hl{color:#f59e0b;font-size:18px}
.dash-val.green{color:#22c55e}
.dash-val.red{color:#ef4444}

/* Layout */
.main-layout{display:flex;gap:10px;margin-top:8px}
.sidebar{width:230px;flex-shrink:0;background:#0c1520;border:1px solid #1a2530;border-radius:10px;padding:10px}
.sidebar h3{font-size:11px;color:#556;margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
#dailyChart{width:100%;height:380px}
.main-chart{flex:1;min-width:0}
.chart-box{background:#0c1520;border:1px solid #1a2530;border-radius:10px;padding:6px}
#chartMain{width:100%;height:440px}

/* Controls */
.controls{display:flex;gap:10px;justify-content:center;padding:12px 0;flex-wrap:wrap;align-items:center}
.btn-buy,.btn-sell,.btn-next{padding:12px 0;width:100px;font-size:16px;border-radius:10px}
.btn-buy{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
.btn-buy:hover:not(:disabled){background:linear-gradient(135deg,#f87171,#ef4444)}
.btn-sell{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff}
.btn-sell:hover:not(:disabled){background:linear-gradient(135deg,#4ade80,#22c55e)}
.btn-next{background:#1e2d3d;color:#8899aa;width:120px}
.btn-next:hover:not(:disabled){background:#2a3d50}

.msg{text-align:center;font-size:12px;color:#445;min-height:18px;padding:4px 0}

/* Result */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;justify-content:center;align-items:center}
.overlay.show{display:flex}
.card{background:#131e2c;border:2px solid #1e2d3d;border-radius:16px;padding:30px 40px;text-align:center;max-width:380px;width:90%}
.card .big{font-size:52px;font-weight:800;margin:8px 0}
.card .sub{font-size:13px;color:#667;line-height:1.8;margin:10px 0}
.card .again{margin-top:14px}

footer{text-align:center;padding:16px 0;font-size:11px;color:#334;border-top:1px solid #1a2530;margin-top:20px}

@media(max-width:800px){
.main-layout{flex-direction:column}
.sidebar{width:100%}#dailyChart{height:200px}
#chartMain{height:340px}
.controls .btn{width:80px;font-size:14px}
.dash{gap:6px}.dash-val{font-size:13px}
}
</style>
</head>
<body>
<div class="container">
<div class="top-bar">
<span class="logo">K</span>
<span style="font-size:16px;font-weight:600;margin-right:8px">K-line Trainer</span>
<input id="codeInput" placeholder="600036" maxlength="6" autofocus>
<button class="btn btn-start" id="btnStart">开始训练</button>
<button class="btn btn-again" id="btnAgain" style="display:none">再来一把</button>
</div>

<div class="dash" id="dash" style="opacity:0.35">
<div class="dash-item"><div class="dash-label">Stock</div><div class="dash-val hl" id="dStock">----</div></div>
<div class="dash-item"><div class="dash-label">Date</div><div class="dash-val" id="dDate">----</div></div>
<div class="dash-item"><div class="dash-label">Open</div><div class="dash-val" id="dOpen">--</div></div>
<div class="dash-item"><div class="dash-label">Prev</div><div class="dash-val" id="dPrev">--</div></div>
<div class="dash-item"><div class="dash-label">Candle</div><div class="dash-val" id="dProg">0/0</div></div>
<div class="dash-item"><div class="dash-label">Buy</div><div class="dash-val green" id="dBScore">--</div></div>
<div class="dash-item"><div class="dash-label">Sell</div><div class="dash-val red" id="dSScore">--</div></div>
<div class="dash-item"><div class="dash-label">Total</div><div class="dash-val hl" id="dTotal" style="font-size:20px">--</div></div>
</div>

<div class="main-layout">
<div class="sidebar"><h3>Daily K-line</h3><div id="dailyChart"></div></div>
<div class="main-chart"><div class="chart-box"><div id="chartMain"></div></div></div>
</div>

<div class="controls">
<button class="btn btn-buy" id="btnBuy" disabled>Buy</button>
<button class="btn btn-sell" id="btnSell" disabled>Sell</button>
<button class="btn btn-next" id="btnNext" disabled>Next</button>
</div>
<div class="msg" id="msg">Enter stock code, then click [开始训练]</div>
</div>

<div class="overlay" id="overlay"><div class="card" id="card"></div></div>

<footer>Data: EastMoney & Sina | For educational purposes only</footer>

<script>
// --- Config ---
var API_EM="https://push2his.eastmoney.com/api/qt/stock/kline/get";
var API_SINA="https://money.finance.sina.com.cn/quotes_service/api/json_v2.php/CN_MarketData.getKLineData";

// --- State ---
var bars=null,daily=null,idx=0,active=false,code="";
var hasB=false,hasS=false,bPrice=null,sPrice=null,bAt=null,sAt=null;
var dHigh=0,dLow=0,timer=null;
var mcMain,mcDaily;
var NAMES={"600036":"CM Bank","600519":"Kweichow Moutai","002594":"BYD","000333":"Midea","300750":"CATL","601318":"Ping An","000001":"Ping An Bk","600900":"Yangtze Pwr","000858":"Wuliangye"};

// --- DOM ---
var ci=document.getElementById("codeInput");
var btnStart=document.getElementById("btnStart"),btnAgain=document.getElementById("btnAgain");
var btnBuy=document.getElementById("btnBuy"),btnSell=document.getElementById("btnSell"),btnNext=document.getElementById("btnNext");
var msg=document.getElementById("msg");
var overlay=document.getElementById("overlay"),card=document.getElementById("card");

// --- Helpers ---
function fmd(d){return d.getFullYear()+("0"+(d.getMonth()+1)).slice(-2)+("0"+d.getDate()).slice(-2)}
function fm(n){if(n>=1e8)return(n/1e8).toFixed(2)+"B";if(n>=1e4)return(n/1e4).toFixed(0)+"W";return n.toFixed(0)}
function gbd(d){var m={};for(var i=0;i<d.length;i++){var dt=d[i].time.slice(0,10);if(!m[dt])m[dt]=[];m[dt].push(d[i])}return m}

function jsonp(url,p,tm){
  return new Promise(function(ok,no){
    var cb="_g_"+Math.random().toString(36).slice(2,10),sep=url.indexOf("?")===-1?"?":"&",to;
    function cl(){clearTimeout(to);delete window[cb]}
    window[cb]=function(d){cl();ok(d)};
    var s=document.createElement("script");
    s.onerror=function(){cl();no(new Error("net"))};s.src=url+sep+p+"="+cb;document.head.appendChild(s);
    to=setTimeout(function(){cl();no(new Error("timeout"))},tm||15000);
  });
}

// --- API ---
function fk(c){
  var m=/^6/.test(c)?1:0,n=new Date(),b=new Date(n);b.setFullYear(b.getFullYear()-3);
  return jsonp(API_EM+"?secid="+m+"."+c+"&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61&klt=5&fqt=1&beg="+fmd(b)+"&end="+fmd(n)+"&lmt=8000","cb",20000).then(function(j){
    if(j&&j.data&&j.data.klines&&j.data.klines.length)return j.data.klines.map(function(k){var p=k.split(",");return{time:p[0],open:+p[1],close:+p[2],high:+p[3],low:+p[4],volume:+p[5]||0};});
    throw new Error("no 5m");
  });
}

function fkDaily(c){
  var m=/^6/.test(c)?1:0,n=new Date(),b=new Date(n);b.setMonth(b.getMonth()-3);
  return jsonp(API_EM+"?secid="+m+"."+c+"&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61&klt=101&fqt=1&beg="+fmd(b)+"&end="+fmd(n)+"&lmt=20","cb",15000).then(function(j){
    if(j&&j.data&&j.data.klines&&j.data.klines.length)return j.data.klines.slice(-15).map(function(k){var p=k.split(",");return{date:p[0],open:+p[1],close:+p[2],high:+p[3],low:+p[4],volume:+p[5]||0};});
    throw new Error("no daily");
  });
}

function fetch5m(c){return fk(c).catch(function(){return jsonp(API_SINA+"?symbol="+(/^6/.test(c)?"sh":"sz")+c+"&scale=5&ma=no&datalen=5000","callback",20000).then(function(j){if(Array.isArray(j)&&j.length)return j.map(function(k){return{time:k.day,open:+k.open,close:+k.close,high:+k.high,low:+k.low,volume:+k.volume||0};});throw new Error("no")})})}

// --- Scoring ---
function buyScore(){if(!hasB)return 0;return Math.round(((dHigh-bPrice)/(dHigh-dLow))*100-50)}
function sellScore(){if(!hasS)return 0;return Math.round(((sPrice-dLow)/(dHigh-dLow))*100-50)}
function totalScore(){return buyScore()+sellScore()}

// --- Dashboard ---
function updateDash(){
  document.getElementById("dProg").textContent=(idx+1)+"/"+bars.length;
  var bs=buyScore(),ss=sellScore(),ts=bs+ss;
  document.getElementById("dBScore").textContent=hasB?(bs>=0?"+":"")+bs:"--";
  document.getElementById("dSScore").textContent=hasS?(ss>=0?"+":"")+ss:"--";
  var te=document.getElementById("dTotal");te.textContent=ts;
  te.style.color=ts>0?"#22c55e":ts<0?"#ef4444":"#f59e0b";
}

// --- Charts ---
var hasEC=typeof echarts!=="undefined";
if(hasEC){mcMain=echarts.init(document.getElementById("chartMain"),"dark");mcDaily=echarts.init(document.getElementById("dailyChart"),"dark");window.addEventListener("resize",function(){mcMain.resize();mcDaily.resize()})}

function renderDaily(){
  if(!hasEC||!daily)return;
  var t=[],o=[],c=[],h=[],l=[];
  for(var i=0;i<daily.length;i++){var d=daily[i];t.push(d.date.slice(5));o.push(d.open);c.push(d.close);h.push(d.high);l.push(d.low)}
  mcDaily.setOption({tooltip:{trigger:"axis",formatter:function(p){var dd=daily[p[0].dataIndex];return dd.date+" O:"+dd.open+" C:"+dd.close+" H:"+dd.high+" L:"+dd.low}},grid:{left:55,right:8,top:8,bottom:24},xAxis:{type:"category",data:t,axisLabel:{fontSize:8,color:"#445"},axisLine:{lineStyle:{color:"#1a2530"}}},yAxis:{type:"value",min:Math.min.apply(null,l)*0.98,max:Math.max.apply(null,h)*1.02,axisLabel:{fontSize:8,color:"#445"},splitLine:{lineStyle:{color:"#111a24"}}},series:[{type:"candlestick",data:t.map(function(_,i){return[o[i],c[i],l[i],h[i]]}),itemStyle:{color:"#ef4444",color0:"#22c55e",borderColor:"#ef4444",borderColor0:"#22c55e"}}]},true);
}

function renderMain(){
  if(!hasEC)return;
  var t=[],o=[],v=[],ml=[];
  for(var i=0;i<=idx;i++){t.push(bars[i].time.slice(11,16));o.push([bars[i].open,bars[i].close,bars[i].low,bars[i].high]);v.push(bars[i].volume)}
  if(hasB)ml.push({xAxis:bAt,lineStyle:{color:"#ef4444",width:2,type:"solid"},label:{formatter:"B",color:"#ef4444",fontSize:14,fontWeight:"bold",position:"start"}});
  if(hasS)ml.push({xAxis:sAt,lineStyle:{color:"#22c55e",width:2,type:"solid"},label:{formatter:"S",color:"#22c55e",fontSize:14,fontWeight:"bold",position:"start"}});
  mcMain.setOption({backgroundColor:"transparent",
    tooltip:{trigger:"axis",axisPointer:{type:"cross"},backgroundColor:"#131e2c",borderColor:"#2a3d50",textStyle:{color:"#d0d6e0",fontSize:12},formatter:function(p){var k=null;for(var j=0;j<p.length;j++){if(p[j].seriesName==="K"){k=p[j];break}}if(!k)return"";var br=bars[k.dataIndex];var cl=br.close>=br.open?"#ef4444":"#22c55e";var sg=br.close>=br.open?"+":"";var ch=((br.close-br.open)/br.open*100);return"<b>"+br.time+"</b><br>O:"+br.open.toFixed(2)+" C:"+br.close.toFixed(2)+" H:"+br.high.toFixed(2)+" L:"+br.low.toFixed(2)+" V:"+fm(br.volume)+" Chg:"+sg+ch.toFixed(2)+"%"}},
    grid:[{left:"6%",right:"6%",top:50,height:"65%"},{left:"6%",right:"6%",top:"82%",height:"10%"}],
    xAxis:[{type:"category",data:t,boundaryGap:true,axisLine:{lineStyle:{color:"#1a2530"}},axisLabel:{color:"#445",fontSize:10,interval:Math.max(0,Math.floor(t.length/10))},gridIndex:0},{type:"category",data:t,axisLine:{show:false},axisLabel:{show:false},gridIndex:1}],
    yAxis:[{scale:true,gridIndex:0,axisLabel:{color:"#445",fontSize:10},splitLine:{lineStyle:{color:"#111a24"}}},{scale:true,gridIndex:1,axisLabel:{color:"#445",fontSize:10}}],
    dataZoom:[{type:"inside",xAxisIndex:[0,1]}],
    series:[{name:"K",type:"candlestick",data:o,xAxisIndex:0,yAxisIndex:0,itemStyle:{color:"#ef4444",color0:"#22c55e",borderColor:"#ef4444",borderColor0:"#22c55e"},markLine:{silent:true,symbol:"none",data:ml}},{name:"Vol",type:"bar",data:v,xAxisIndex:1,yAxisIndex:1,itemStyle:{color:function(p){return bars[p.dataIndex].close>=bars[p.dataIndex].open?"rgba(239,68,68,0.4)":"rgba(34,197,94,0.4)"}}}]
  },true);
}

// --- Gameplay ---
function step(){
  if(!active)return;
  idx++;renderMain();updateDash();
  if(idx>=bars.length-1){end()}else{resetTimer()}
}
function resetTimer(){clearInterval(timer);timer=setInterval(step,5000)}
function pauseTimer(){clearInterval(timer);timer=null}

function start(b,c,d,dy){
  bars=b;code=c;idx=0;daily=dy;hasB=false;hasS=false;bPrice=sPrice=bAt=sAt=null;active=true;
  dHigh=0;dLow=Infinity;
  for(var i=0;i<b.length;i++){if(b[i].high>dHigh)dHigh=b[i].high;if(b[i].low<dLow)dLow=b[i].low}
  var nm=NAMES[c]||c;
  document.getElementById("dStock").textContent=nm;document.getElementById("dDate").textContent=d;
  document.getElementById("dOpen").textContent=b[0].open.toFixed(2);
  document.getElementById("dPrev").textContent=(dy&&dy.length>=2?dy[dy.length-2].close:b[0].open).toFixed(2);
  document.getElementById("dash").style.opacity="1";
  updateDash();
  btnBuy.disabled=false;btnSell.disabled=false;btnNext.disabled=false;
  btnStart.style.display="none";btnAgain.style.display="inline-block";
  btnAgain.style.opacity="0.3";btnAgain.disabled=true;
  msg.textContent="Watch the candles... Buy low, Sell high!";msg.style.color="#445";
  renderDaily();renderMain();resetTimer();
}

function end(){
  active=false;pauseTimer();
  btnBuy.disabled=true;btnSell.disabled=true;btnNext.disabled=true;
  btnAgain.style.opacity="1";btnAgain.disabled=false;
  var bs=buyScore(),ss=sellScore(),t=bs+ss;
  updateDash();
  var detail="";
  if(hasB)detail+="Buy @"+bPrice.toFixed(2)+" -> Score "+(bs>=0?"+":"")+bs;else detail+="No buy";
  detail+="\n";
  if(hasS)detail+="Sell @"+sPrice.toFixed(2)+" -> Score "+(ss>=0?"+":"")+ss;else detail+="No sell";
  detail+="\nRange: "+dLow.toFixed(2)+" ~ "+dHigh.toFixed(2);
  var label,color;
  if(t>50){label="EXCELLENT";color="#f59e0b"}else if(t>0){label="WIN";color="#22c55e"}else{label="LOSE";color="#ef4444"}
  card.innerHTML='<h2 style="color:'+color+'">'+label+'</h2><div class="big" style="color:'+color+'">'+(t>=0?"+":"")+t+'</div><div class="sub">'+detail.replace(/\n/g,"<br>")+'</div><div class="again"><button class="btn btn-again" onclick="closeOverlay();doStart()">再来一把</button></div>';
  overlay.classList.add("show");
  msg.textContent="Round over. Score: "+(t>=0?"+":"")+t;msg.style.color=color;
}
function closeOverlay(){overlay.classList.remove("show")}

function doBuy(){if(!active||hasB)return;hasB=true;bPrice=bars[idx].close;bAt=idx;btnBuy.disabled=true;renderMain();updateDash();msg.textContent="Bought @ "+bPrice.toFixed(2)+" | Buy Score: "+(buyScore()>=0?"+":"")+buyScore();msg.style.color="#ef4444"}
function doSell(){if(!active||hasS)return;hasS=true;sPrice=bars[idx].close;sAt=idx;btnSell.disabled=true;renderMain();updateDash();msg.textContent="Sold @ "+sPrice.toFixed(2)+" | Sell Score: "+(sellScore()>=0?"+":"")+sellScore();msg.style.color="#22c55e"}

// --- Init ---
function doStart(){
  if(active){pauseTimer()}
  btnBuy.disabled=btnSell.disabled=btnNext.disabled=true;
  msg.textContent="Loading...";msg.style.color="#445";
  var c=(ci.value||"").replace(/^(sh|sz|bj)/i,"").trim();
  if(!/^\d{6}$/.test(c)){msg.textContent="Invalid stock code (6 digits)";return}
  Promise.all([fetch5m(c),fkDaily(c)]).then(function(r){
    var d=r[0],dy=r[1],g=gbd(d),ds=Object.keys(g).sort();
    if(!ds.length){msg.textContent="No data";return}
    var dt=ds[Math.floor(Math.random()*ds.length)],b=g[dt];
    if(b.length<5){msg.textContent="Too few candles";return}
    start(b,c,dt,dy);
  }).catch(function(e){msg.textContent="Failed: "+e.message;msg.style.color="#ef4444"});
}

btnBuy.onclick=doBuy;btnSell.onclick=doSell;
btnNext.onclick=function(){if(!active)return;pauseTimer();step()};
btnStart.onclick=doStart;
btnAgain.onclick=doStart;
ci.onkeydown=function(e){if(e.key==="Enter")doStart()};
ci.oninput=function(){ci.value=ci.value.replace(/\D/g,"").slice(0,6)};
overlay.onclick=function(e){if(e.target===overlay)closeOverlay()};

// Bootstrap
ci.value="600036";doStart();
</script>
</body>
</html>
