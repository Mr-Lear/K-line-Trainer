<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>A-Share K-line Trainer</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Microsoft YaHei,sans-serif;background:#0f1923;color:#e0e6ed;min-height:100vh}
.container{max-width:1100px;margin:0 auto;padding:20px 16px}
header{display:flex;align-items:center;gap:14px;padding:20px 0 10px;border-bottom:1px solid #1e2d3d}
.logo{width:40px;height:40px;background:linear-gradient(135deg,#f39c12,#e74c3c);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:#fff;flex-shrink:0}
h1{font-size:22px;font-weight:600;letter-spacing:1px}
h1 small{font-size:13px;font-weight:400;color:#7f8c9b;margin-left:10px}
.search-section{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px;align-items:center}
label{color:#9aaec2;font-size:14px}
input{flex:0 1 160px;padding:10px 14px;border:1px solid #2a3a4a;border-radius:8px;background:#162230;color:#e0e6ed;font-size:16px;letter-spacing:1px;outline:none;transition:border-color .25s}
input:focus{border-color:#3b82f6}
input::placeholder{color:#4a5a6a;font-size:13px}
.btn{padding:10px 22px;border:none;border-radius:8px;font-size:14px;cursor:pointer;transition:all .2s;white-space:nowrap;font-weight:500}
.btn:active{transform:scale(.96)}
.btn-primary{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff}
.btn-primary:hover{background:linear-gradient(135deg,#60a5fa,#3b82f6)}
.btn-primary:disabled,.btn-shuffle:disabled{opacity:.5;cursor:not-allowed}
.btn-shuffle{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff}
.btn-shuffle:hover{background:linear-gradient(135deg,#fbbf24,#f59e0b)}
.info-card{display:none;margin-top:18px;padding:16px 20px;background:#162230;border:1px solid #1e2d3d;border-radius:12px;gap:20px;flex-wrap:wrap;align-items:center}
.info-card.visible{display:flex}
.info-item{display:flex;flex-direction:column;gap:2px}
.label{font-size:11px;color:#5a6a7a;text-transform:uppercase;letter-spacing:.5px}
.value{font-size:16px;font-weight:600}
.code-highlight{color:#f59e0b}
.up{color:#ef4444}
.down{color:#22c55e}
.amount{font-size:22px}
.chart-wrapper{margin-top:18px;background:#0d1a26;border:1px solid #1e2d3d;border-radius:12px;padding:8px;position:relative}
#chart{width:100%;height:560px}
.status{margin-top:12px;font-size:13px;color:#7f8c9b;min-height:20px;text-align:center}
.status.error{color:#ef4444}
.status.success{color:#22c55e}
footer{margin-top:40px;padding:16px 0;border-top:1px solid #1e2d3d;text-align:center;font-size:12px;color:#4a5a6a}
footer a{color:#5a7a9a;text-decoration:none}
footer a:hover{color:#3b82f6}
@media(max-width:640px){
.container{padding:12px 10px}
header h1{font-size:17px}
header h1 small{display:block;margin-left:0;margin-top:2px}
input{flex:1 1 100%}
#chart{height:400px}
.info-card{padding:12px 14px;gap:12px}
.info-item .value.amount{font-size:18px}
}
</style>
</head>
<body>
<div class="container">
<header><div class="logo">K</div><h1>A-Share K-line Trainer <small>5-min Random Backtest</small></h1></header>

<div class="search-section">
<label for="codeInput">Stock Code</label>
<input id="codeInput" placeholder="e.g. 600036" maxlength="6" autofocus>
<button class="btn btn-primary" id="queryBtn">Query</button>
<button class="btn btn-shuffle" id="shuffleBtn">Random Day</button>
</div>

<div class="info-card" id="infoCard">
<div class="info-item"><span class="label">Stock</span><span class="value code-highlight" id="stockName">--</span></div>
<div class="info-item"><span class="label">Date</span><span class="value" id="tradeDate">--</span></div>
<div class="info-item"><span class="label">Open</span><span class="value" id="openVal">--</span></div>
<div class="info-item"><span class="label">Close</span><span class="value" id="closeVal">--</span></div>
<div class="info-item"><span class="label">High</span><span class="value up" id="highVal">--</span></div>
<div class="info-item"><span class="label">Low</span><span class="value down" id="lowVal">--</span></div>
<div class="info-item"><span class="label">Change</span><span class="value" id="changeVal">--</span></div>
<div class="info-item"><span class="label">Volume</span><span class="value amount" id="amountVal">--</span></div>
</div>

<div class="chart-wrapper"><div id="chart"></div></div>
<div class="status" id="status">Enter a 6-digit stock code to begin...</div>

<footer>
Data from <a href="https://push2his.eastmoney.com/" target="_blank" rel="noopener">EastMoney</a>
| For educational purposes only
| <a href="https://github.com/Mr-Lear/K-line-Trainer" target="_blank" rel="noopener">GitHub</a>
</footer>
</div>

<script>
// Config
var KLINE_API_EM="https://push2his.eastmoney.com/api/qt/stock/kline/get";
var KLINE_API_SINA="https://money.finance.sina.com.cn/quotes_service/api/json_v2.php/CN_MarketData.getKLineData";
var KLINE_LIMIT=5000;

// Name map (fallback)
var NAMES={"600036":"CM Bank","600519":"Kweichow Moutai","002594":"BYD","000333":"Midea Group","300750":"CATL","601318":"Ping An","000001":"Ping An Bank","600900":"Yangtze Power","000858":"Wuliangye"};

// DOM
var ci=document.getElementById("codeInput"),qb=document.getElementById("queryBtn"),sb=document.getElementById("shuffleBtn");
var ic=document.getElementById("infoCard"),se=document.getElementById("status");
var sne=document.getElementById("stockName"),tde=document.getElementById("tradeDate");
var ove=document.getElementById("openVal"),cve=document.getElementById("closeVal"),hve=document.getElementById("highVal"),lve=document.getElementById("lowVal"),chve=document.getElementById("changeVal"),ave=document.getElementById("amountVal");

// ECharts
var mc=echarts.init(document.getElementById("chart"),"dark");
window.addEventListener("resize",function(){mc.resize()});

// Helpers
function fmtDate(d){return d.getFullYear()+("0"+(d.getMonth()+1)).slice(-2)+("0"+d.getDate()).slice(-2)}
function gbd(d){var m={};for(var i=0;i<d.length;i++){var dt=d[i].time.slice(0,10);if(!m[dt])m[dt]=[];m[dt].push(d[i])}return m}
function fm(n){if(n>=1e8)return(n/1e8).toFixed(2)+"B";if(n>=1e4)return(n/1e4).toFixed(0)+"W";return n.toFixed(0)}

// JSONP helper - bypasses CORS by loading a script tag
function jsonp(url,cbParam,timeout){
  return new Promise(function(resolve,reject){
    var cb="_cb_"+Math.random().toString(36).slice(2,10);
    var sep=url.indexOf("?")===-1?"?":"&";
    var t;
    function clean(){if(t)clearTimeout(t);delete window[cb]}
    window[cb]=function(data){clean();resolve(data)};
    var s=document.createElement("script");
    s.onerror=function(){clean();reject(new Error("Network error"))};
    s.src=url+sep+cbParam+"="+cb;
    document.head.appendChild(s);
    t=setTimeout(function(){clean();reject(new Error("Timeout"))},timeout||15000);
  });
}

// Fetch from EastMoney (JSONP)
function fk(c){
  var m=/^6/.test(c)?1:0;
  var now=new Date();
  var beg=new Date(now);beg.setFullYear(beg.getFullYear()-3);
  var u=KLINE_API_EM+"?secid="+m+"."+c+"&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61&klt=5&fqt=1&beg="+fmtDate(beg)+"&end="+fmtDate(now)+"&lmt="+KLINE_LIMIT;
  return jsonp(u,"cb",20000).then(function(j){
    if(j&&j.data&&j.data.klines&&j.data.klines.length)return j.data.klines.map(function(k){var p=k.split(",");return{time:p[0],open:+p[1],close:+p[2],high:+p[3],low:+p[4],volume:+p[5]||0};});
    throw new Error("EM empty");
  });
}

// Fallback: Sina Finance API (JSONP)
function fkSina(c){
  var prefix=/^6/.test(c)?"sh":"sz";
  var u=KLINE_API_SINA+"?symbol="+prefix+c+"&scale=5&ma=no&datalen=5000";
  return jsonp(u,"callback",20000).then(function(j){
    if(Array.isArray(j)&&j.length)return j.map(function(k){return{time:k.day,open:+k.open,close:+k.close,high:+k.high,low:+k.low,volume:+k.volume||0};});
    throw new Error("Sina empty");
  });
}

// Try EastMoney first, fallback to Sina
function fetchData(c){return fk(c).catch(function(){return fkSina(c)})}

function dq(raw,rd){
qb.disabled=true;sb.disabled=true;se.textContent="Fetching...";
se.className="status";
try{
var c=(raw||"").replace(/^(sh|sz|bj)/i,"").trim();
if(!/^\d{6}$/.test(c)){se.textContent="Invalid stock code";qb.disabled=false;sb.disabled=false;return}
se.textContent="Fetching K-line...";
fetchData(c).then(function(d){
var g=gbd(d),ds=Object.keys(g).sort();
if(!ds.length){se.textContent="No data found";qb.disabled=false;sb.disabled=false;return}
var dt=rd?ds[Math.floor(Math.random()*ds.length)]:ds[ds.length-1];
var b=g[dt],nm=NAMES[c]||c;

// Info card
var op=b[0].open,cl=b[b.length-1].close,hi=0,lo=Infinity,tv=0;
for(var i=0;i<b.length;i++){if(b[i].high>hi)hi=b[i].high;if(b[i].low<lo)lo=b[i].low;tv+=b[i].volume}
var cp=(cl-op)/op*100,cls=cp>=0?"up":"down";
sne.textContent=nm+" ("+c+")";tde.textContent=dt;
ove.textContent=op.toFixed(2);cve.textContent=cl.toFixed(2);hve.textContent=hi.toFixed(2);lve.textContent=lo.toFixed(2);
chve.textContent=(cp>=0?"+":"")+cp.toFixed(2)+"%";chve.className="value "+cls;
ave.textContent=fm(tv);ic.classList.add("visible");

// Chart
var times=[],ohlc=[],vols=[];
for(var i=0;i<b.length;i++){times.push(b[i].time.slice(11,16));ohlc.push([b[i].open,b[i].close,b[i].low,b[i].high]);vols.push(b[i].volume)}
var bars=b;
mc.setOption({
backgroundColor:"transparent",
tooltip:{trigger:"axis",axisPointer:{type:"cross"},backgroundColor:"#1a2d3d",borderColor:"#2a4a6a",textStyle:{color:"#e0e6ed",fontSize:12},
formatter:function(p){
var k=null;for(var j=0;j<p.length;j++){if(p[j].seriesName==="K-line"){k=p[j];break}}if(!k)return"";
var i=k.dataIndex,br=bars[i];
var color=br.close>=br.open?"#ef4444":"#22c55e";
var sign=br.close>=br.open?"+":"";
var chg=((br.close-br.open)/br.open*100);
return"<div style=font-weight:600;margin-bottom:4px>"+br.time+"</div>"
+"<div>Open: <span style=color:"+color+">"+br.open.toFixed(2)+"</span></div>"
+"<div>Close: <span style=color:"+color+">"+br.close.toFixed(2)+"</span></div>"
+"<div>High: <span style=color:#60a5fa>"+br.high.toFixed(2)+"</span></div>"
+"<div>Low: <span style=color:#60a5fa>"+br.low.toFixed(2)+"</span></div>"
+"<div>Vol: "+fm(br.volume)+"</div>"
+"<div>Change: <span style=color:"+color+">"+sign+chg.toFixed(2)+"%</span></div>";
}},
grid:[{left:"6%",right:"6%",top:50,height:"58%"},{left:"6%",right:"6%",top:"78%",height:"14%"}],
xAxis:[{type:"category",data:times,boundaryGap:true,axisLine:{lineStyle:{color:"#1e2d3d"}},axisLabel:{color:"#5a6a7a",fontSize:11,interval:Math.max(0,Math.floor(times.length/8)-1)},splitLine:{show:false},gridIndex:0},{type:"category",data:times,axisLine:{show:false},axisLabel:{show:false},gridIndex:1}],
yAxis:[{scale:true,gridIndex:0,axisLabel:{color:"#5a6a7a",fontSize:11},splitLine:{lineStyle:{color:"#1a2a3a",type:"dashed"}}},{scale:true,gridIndex:1,axisLabel:{color:"#5a6a7a",fontSize:10},axisLine:{show:false}}],
dataZoom:[{type:"inside",xAxisIndex:[0,1]}],
series:[{name:"K-line",type:"candlestick",data:ohlc,xAxisIndex:0,yAxisIndex:0,itemStyle:{color:"#ef4444",color0:"#22c55e",borderColor:"#ef4444",borderColor0:"#22c55e"},markLine:{silent:true,symbol:"none",lineStyle:{color:"#3b82f6",type:"dashed",width:1},data:[{type:"average",label:{formatter:"Avg: {c}",color:"#3b82f6",fontSize:11,position:"insideEndTop"}}]}},{name:"Volume",type:"bar",data:vols,xAxisIndex:1,yAxisIndex:1,itemStyle:{color:function(p){return bars[p.dataIndex].close>=bars[p.dataIndex].open?"rgba(239,68,68,0.6)":"rgba(34,197,94,0.6)"}}}]
},true);
se.textContent=dt+" ("+b.length+" bars)";se.className="status success";
}).catch(function(e){se.textContent="Failed: "+e.message;se.className="status error";qb.disabled=false;sb.disabled=false});
}catch(e){se.textContent="Error: "+e.message;se.className="status error";qb.disabled=false;sb.disabled=false}
finally{setTimeout(function(){qb.disabled=false;sb.disabled=false},500)}
}

// Events
qb.onclick=function(){dq(ci.value.trim()||"600036",false)};
sb.onclick=function(){dq(ci.value.trim()||"600036",true)};
ci.onkeydown=function(e){if(e.key==="Enter")qb.click()};
ci.oninput=function(){ci.value=ci.value.replace(/\D/g,"").slice(0,6)};

// Bootstrap
ci.value="600036";dq("600036",true);
</script>
</body>
</html>
